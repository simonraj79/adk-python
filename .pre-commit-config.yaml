repos:
  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
  - repo: https://github.com/google/pyink
    rev: 25.12.0
    hooks:
      - id: pyink
  - repo: local
    hooks:
      - id: addlicense
        name: addlicense
        entry: >
          bash -c 'if command -v addlicense1 >/dev/null 2>&1;
          then addlicense1 -c "Google LLC" -l apache "$@";
          else echo "Warning: addlicense not installed, skipping"; fi' --
        language: system
        files: \.(py|sh)$
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        exclude: ^(\.agents/|AGENTS\.md|CHANGELOG\.md)
        additional_dependencies:
          - mdformat-gfm
