              - 'heading "BI Brief: Crime Statistics in Singapore (2020-2022)" [level=2] [ref=e515]'
              - heading "Executive Summary" [level=3] [ref=e516]
              - paragraph [ref=e517]: Singapore experienced a notable increase in total criminal cases from 2020 to 2022. This surge was primarily driven by a significant rise in scams and cybercrimes, which more than doubled over the three-year period. In contrast, physical crime cases remained relatively stable, with slight fluctuations. The overall crime rate per 100,000 population also increased, reflecting the growing prevalence of digital offenses.
              - heading "Key Metrics" [level=3] [ref=e518]
              - list [ref=e519]:
                - listitem [ref=e520]:
                  - strong [ref=e521]: "Total Criminal Cases:"
                  - list [ref=e522]:
                    - listitem [ref=e523]: "2020: 37,273 cases"
                    - listitem [ref=e524]: "2021: 46,229 cases"
                    - listitem [ref=e525]: "2022: 53,862 cases"
                - listitem [ref=e526]:
                  - strong [ref=e527]: "Year-on-Year Increase (Total Cases):"
                  - list [ref=e528]:
                    - listitem [ref=e529]: "2020 to 2021: +24.03%"
                    - listitem [ref=e530]: "2021 to 2022: +16.51%"
                - listitem [ref=e531]:
                  - strong [ref=e532]: "Physical Crime Cases Recorded:"
                  - list [ref=e533]:
                    - listitem [ref=e534]: "2020: 19,498 cases"
                    - listitem [ref=e535]: "2021: 19,343 cases"
                    - listitem [ref=e536]: "2022: 20,193 cases"
                - listitem [ref=e537]:
                  - strong [ref=e538]: "Scams & Cybercrimes Cases Recorded:"
                  - list [ref=e539]:
                    - listitem [ref=e540]: "2020: 17,775 cases"
                    - listitem [ref=e541]: "2021: 26,886 cases"
                    - listitem [ref=e542]: "2022: 33,669 cases"
                - listitem [ref=e543]:
                  - strong [ref=e544]: "Physical Crime Rate (Per 100,000 Population):"
                  - list [ref=e545]:
                    - listitem [ref=e546]: "2020: 343"
                    - listitem [ref=e547]: "2021: 355"
                    - listitem [ref=e548]: "2022: 358"
                - listitem [ref=e549]:
                  - strong [ref=e550]: "Scams & Cybercrimes Rate (Per 100,000 Population):"
                  - list [ref=e551]:
                    - listitem [ref=e552]: "2020: 313"
                    - listitem [ref=e553]: "2021: 493"
                    - listitem [ref=e554]: "2022: 597"
              - heading "Analysis" [level=3] [ref=e555]
              - paragraph [ref=e556]: The total number of criminal cases in Singapore demonstrated a consistent upward trend from 2020 to 2022. The overall increase was significant, with a 24.03% jump from 2020 to 2021, followed by a 16.51% increase from 2021 to 2022.
              - paragraph [ref=e557]: This growth is predominantly attributed to the surge in "Scams & Cybercrimes Cases Recorded." These cases escalated dramatically from 17,775 in 2020 to 33,669 in 2022. Concurrently, the rate of scams and cybercrimes per 100,000 population rose from 313 in 2020 to 597 in 2022.
              - paragraph [ref=e558]: "In contrast, \"Physical Crime Cases Recorded\" remained relatively stable throughout the period: 19,498 in 2020, 19,343 in 2021, and 20,193 in 2022. The \"Physical Crime Rate\" per 100,000 population also showed only minor fluctuations, moving from 343 in 2020 to 358 in 2022."
              - paragraph [ref=e559]: The attached stacked bar chart (20260423_225205.png) visually represents this breakdown, clearly illustrating the significant and growing contribution of scams and cybercrimes to the overall crime landscape, while physical crimes constitute a relatively static portion.
              - paragraph [ref=e560]:
                - emphasis [ref=e561]: "Note: With effect from year 2022, crime statistics from the Singapore Police Force are reported under the categories 'Physical Crimes' and 'Scams & Cybercrimes', instead of 'Overall Crime'. The data used for 2020 and 2021 aligns with these new categories for consistent comparison."
              - heading "Sources" [level=3] [ref=e562]
              - list [ref=e563]:
                - listitem [ref=e564]:
                  - text: "Singapore Department of Statistics (SingStat) - Tablebuilder: M891481 ("
