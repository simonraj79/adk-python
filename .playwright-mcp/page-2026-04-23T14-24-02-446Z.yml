              - 'heading "BI Brief: Singapore''s Crime Statistics (2020-2022)" [level=2] [ref=e433]'
              - heading "Executive Summary" [level=3] [ref=e434]
              - paragraph [ref=e435]: This brief analyzes Singapore's crime statistics from 2020 to 2022, focusing on physical crimes versus scams and cybercrimes. While physical crime cases remained relatively stable with minor fluctuations, scams and cybercrimes saw a significant and consistent increase over the three-year period, indicating a shift in the crime landscape.
              - heading "Key Metrics" [level=3] [ref=e436]
              - paragraph [ref=e437]:
                - strong [ref=e438]: "Physical Crime Cases Recorded:"
              - list [ref=e439]:
                - listitem [ref=e440]:
                  - strong [ref=e441]: "2020:"
                  - text: 19,498 cases
                - listitem [ref=e442]:
                  - strong [ref=e443]: "2021:"
                  - text: 19,343 cases
                - listitem [ref=e444]:
                  - strong [ref=e445]: "2022:"
                  - text: 20,193 cases
              - paragraph [ref=e446]:
                - strong [ref=e447]: "Scams & Cybercrimes Cases Recorded:"
              - list [ref=e448]:
                - listitem [ref=e449]:
                  - strong [ref=e450]: "2020:"
                  - text: 17,775 cases
                - listitem [ref=e451]:
                  - strong [ref=e452]: "2021:"
                  - text: 26,886 cases
                - listitem [ref=e453]:
                  - strong [ref=e454]: "2022:"
                  - text: 33,669 cases
              - heading "Analysis" [level=3] [ref=e455]
              - paragraph [ref=e456]: The analysis of crime statistics from 2020 to 2022 reveals distinct trends between physical crimes and digitally-enabled offenses.
              - paragraph [ref=e457]:
                - strong [ref=e458]: "Physical Crime Cases:"
                - text: The number of physical crime cases remained relatively stable across the three years. After 19,498 cases in 2020, there was a slight dip to 19,343 cases in 2021, followed by an increase to 20,193 cases in 2022. This suggests that traditional crime types experienced minor fluctuations but no dramatic overall change.
              - paragraph [ref=e459]:
                - strong [ref=e460]: "Scams & Cybercrimes Cases:"
                - text: In stark contrast, scams and cybercrimes demonstrated a significant and sharp upward trend. Starting at 17,775 cases in 2020, these offenses surged to 26,886 cases in 2021 and further escalated to 33,669 cases in 2022. This consistent and substantial increase highlights the growing prevalence and impact of digital forms of crime.
              - paragraph [ref=e461]:
                - text: "The following chart illustrates the trends for both categories:"
                - img "20260423_222301.png" [ref=e462]
                - emphasis [ref=e463]: "Visual: 20260423_222301.png"
              - heading "Sources" [level=3] [ref=e464]
              - list [ref=e465]:
                - listitem [ref=e466]:
                  - strong [ref=e467]: "Dataset ID:"
                  - text: M891481
                - listitem [ref=e468]:
                  - strong [ref=e469]: "Source URL:"
                  - link "https://tablebuilder.singstat.gov.sg/table/M891481" [ref=e470] [cursor=pointer]:
                    - /url: https://tablebuilder.singstat.gov.sg/table/M891481
                - listitem [ref=e471]:
                  - strong [ref=e472]: "Data Provider:"
                  - text: Singapore Department of Statistics (SingStat)
              - heading "Confidence & Gaps" [level=3] [ref=e473]
              - paragraph [ref=e474]:
                - strong [ref=e475]: "Confidence:"
                - text: High. The data is sourced directly from SingStat, a reputable national statistical office, ensuring reliability and accuracy of the reported figures. The consistent methodology across years supports robust trend analysis.
              - paragraph [ref=e476]:
                - strong [ref=e477]: "Gaps:"
                - text: While the brief provides absolute numbers, further analysis could benefit from incorporating population data to calculate crime rates per capita, which is available in the full dataset. This would provide a clearer picture of the risk per individual and account for any population changes over the period. Additionally, a breakdown of specific crime types within "Physical Crime" and "Scams & Cybercrimes" could offer deeper insights into the drivers of these trends.
