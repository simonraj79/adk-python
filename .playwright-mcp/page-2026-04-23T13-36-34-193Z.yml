            - generic [ref=e485]:
              - 'heading "BI Brief: Singapore Crime Statistics (2020-2022)" [level=2] [ref=e486]'
              - heading "Executive Summary" [level=3] [ref=e487]
              - paragraph [ref=e488]: Singapore's crime landscape between 2020 and 2022 underwent a significant transformation, primarily driven by a substantial surge in Scams & Cybercrimes. While Physical Crime Cases saw only a modest increase of 3.56%, Scams & Cybercrimes Cases nearly doubled, rising by 89.42% over the two-year period. This dramatic shift is also reflected in the crime rates per 100,000 population, indicating that the growth in digital offenses significantly outpaced traditional crime categories and population changes. The updated crime reporting categories from 2022 onwards—focusing on 'Physical Crimes' and 'Scams & Cybercrimes'—underscore this evolving challenge.
              - heading "Key Metrics" [level=3] [ref=e489]
              - list [ref=e490]:
                - listitem [ref=e491]:
                  - paragraph [ref=e492]:
                    - strong [ref=e493]: "Physical Crime Cases (2020):"
                    - text: 19,498
                - listitem [ref=e494]:
                  - paragraph [ref=e495]:
                    - strong [ref=e496]: "Physical Crime Cases (2022):"
                    - text: 20,193
                - listitem [ref=e497]:
                  - paragraph [ref=e498]:
                    - strong [ref=e499]: "Physical Crime Cases % Change (2020-2022):"
                    - text: +3.56%
                - listitem [ref=e500]:
                  - paragraph [ref=e501]:
                    - strong [ref=e502]: "Scams & Cybercrimes Cases (2020):"
                    - text: 17,775
                - listitem [ref=e503]:
                  - paragraph [ref=e504]:
                    - strong [ref=e505]: "Scams & Cybercrimes Cases (2022):"
                    - text: 33,669
                - listitem [ref=e506]:
                  - paragraph [ref=e507]:
                    - strong [ref=e508]: "Scams & Cybercrimes Cases % Change (2020-2022):"
                    - text: +89.42%
                - listitem [ref=e509]:
                  - paragraph [ref=e510]:
                    - strong [ref=e511]: "Physical Crime Rate (2020):"
                    - text: 343 per 100,000 Population
                - listitem [ref=e512]:
                  - paragraph [ref=e513]:
                    - strong [ref=e514]: "Physical Crime Rate (2022):"
                    - text: 358 per 100,000 Population
                - listitem [ref=e515]:
                  - paragraph [ref=e516]:
                    - strong [ref=e517]: "Scams & Cybercrimes Rate (2020):"
                    - text: 313 per 100,000 Population
                - listitem [ref=e518]:
                  - paragraph [ref=e519]:
                    - strong [ref=e520]: "Scams & Cybercrimes Rate (2022):"
                    - text: 597 per 100,000 Population
              - heading "Analysis" [level=3] [ref=e521]
              - list [ref=e522]:
                - listitem [ref=e523]:
                  - paragraph [ref=e524]:
                    - strong [ref=e525]: "Divergent Crime Trends (2020-2022):"
                    - text: "The analysis of crime statistics from 2020 to 2022 reveals two distinct trends:"
                  - list [ref=e526]:
                    - listitem [ref=e527]:
                      - strong [ref=e528]: "Physical Crimes:"
                      - text: Cases saw a slight initial dip from 19,498 in 2020 to 19,343 in 2021, before rising to 20,193 in 2022. The overall increase for this period was a modest 3.56%. The physical crime rate per 100,000 population also showed a steady but marginal increase from 343 to 358.
                    - listitem [ref=e529]:
                      - strong [ref=e530]: "Scams & Cybercrimes:"
                      - text: This category demonstrated a steep and consistent upward trajectory. Cases dramatically increased from 17,775 in 2020 to 26,886 in 2021, and further to 33,669 in 2022. This represents a significant 89.42% increase over two years, nearly doubling the number of recorded cases. The scams and cybercrimes rate per 100,000 population nearly doubled, surging from 313 to 597, indicating that this growth significantly outpaced overall population changes.
                - listitem [ref=e531]:
                  - paragraph [ref=e532]:
                    - strong [ref=e533]: "Primary Driver of Crime Increase:"
                    - text: The data clearly indicates that the substantial increase in total reported crime in Singapore during this period is predominantly driven by the significant surge in scams and cybercrimes. In contrast, physical crimes remained relatively stable with only a marginal increase.
                - listitem [ref=e534]:
                  - paragraph [ref=e535]:
                    - strong [ref=e536]: "Updated Reporting Categories:"
                    - text: With effect from 2022, crime statistics from the Singapore Police Force are reported under the distinct categories of 'Physical Crimes' and 'Scams & Cybercrimes,' replacing the broader 'Overall Crime' category. This change reflects the evolving nature of crime and highlights the growing prominence of digital offenses. The current dataset provides more granular data for sub-categories of physical crimes only for 2022, aligning with this new reporting structure.
              - heading "Sources" [level=3] [ref=e537]
              - list [ref=e538]:
                - listitem [ref=e539]:
                  - strong [ref=e540]: "Dataset ID:"
                  - text: M891481
                - listitem [ref=e541]:
                  - strong [ref=e542]: "Source URL:"
                  - link "https://tablebuilder.singstat.gov.sg/table/M891481" [ref=e543] [cursor=pointer]:
                    - /url: https://tablebuilder.singstat.gov.sg/table/M891481
                - listitem [ref=e544]:
                  - strong [ref=e545]: "Data Provider:"
                  - text: Singapore Department of Statistics (SingStat)
              - heading "Confidence & Gaps" [level=3] [ref=e546]
              - list [ref=e547]:
                - listitem [ref=e548]:
                  - paragraph [ref=e549]:
                    - strong [ref=e550]: "Confidence:"
                    - text: High confidence in the observed trends due to the direct use of official crime statistics from SingStat. The consistent upward trajectory and significant percentage changes for scams and cybercrimes, both in absolute numbers and rates, strongly support the conclusion of a major shift in the crime landscape.
                - listitem [ref=e551]:
                  - paragraph [ref=e552]:
                    - strong [ref=e553]: "Gaps:"
                  - list [ref=e554]:
                    - listitem [ref=e555]:
                      - strong [ref=e556]: "Granularity of Physical Crime Data:"
                      - text: More granular data for sub-categories of physical crimes (e.g., violent crime, property crime) is only available for 2022, preventing a detailed year-on-year analysis of specific physical crime trends across the entire 2020-2022 period.
                    - listitem [ref=e557]:
                      - strong [ref=e558]: "Specific Scam/Cybercrime Types:"
                      - text: While the data highlights the overall increase in scams and cybercrimes, a breakdown of the most prevalent types (e.g., e-commerce scams, phishing, tech support scams) would provide deeper insights for targeted prevention strategies.
                    - listitem [ref=e559]:
                      - strong [ref=e560]: "Underlying Factors:"
                      - text: The analysis identifies
                      - emphasis [ref=e561]: what
                      - text: happened but does not delve into the specific socio-economic, technological, or policy factors that may have influenced these crime patterns (e.g., increased internet usage during the pandemic, specific police operations, public awareness campaigns).
